# ─────────────────────────────────────────────────────────────
# Nginx como Reverse Proxy - Protege el backend Node.js
# ─────────────────────────────────────────────────────────────

# Upstream: Define el backend (app-logic es el nombre del servicio en Docker)
upstream backend {
    server app-logic:3000;
}

# Servidor HTTP (puerto 80) - Redirige a HTTPS
server {
    listen 80;
    server_name localhost;

    # Redirigir todo a HTTPS
    return 301 https://$server_name$request_uri;
}

# Servidor HTTPS (puerto 443) - Con SSL
server {
    listen 443 ssl;
    server_name localhost;

    # Certificados SSL
    ssl_certificate     /etc/nginx/ssl/lenos.crt;
    ssl_certificate_key /etc/nginx/ssl/lenos.key;

    # Configuración SSL estricta - TLS 1.3 únicamente
    # NOTA: TLS 1.3 tiene cifrados seguros por defecto, no necesita ssl_ciphers
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Cabeceras de seguridad (además de las que añade Helmet)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/nginx/lenos-access.log;
    error_log /var/log/nginx/lenos-error.log;

    # ─────────────────────────────────────────────────────────
    # REVERSE PROXY: Redirige todo a Node.js
    # ─────────────────────────────────────────────────────────
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Cabeceras para el backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Health check endpoint (para verificar que Nginx está funcionando)
    location /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "Nginx is running!\n";
    }
}
